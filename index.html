<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fusion</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      max-width: 400px;
      padding: 20px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    .tagline {
      font-size: 1.2rem;
      color: #94a3b8;
      margin-bottom: 20px;
    }

    .coming {
      font-size: 1.5rem;
      margin-bottom: 30px;
    }

    .contact {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
    }

    .contact h2 {
      margin-bottom: 10px;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      margin: 5px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Fusion</h1>
    <p class="tagline">Find it, Nearby</p>
    <p class="coming">Coming Soon</p>

    <div class="contact">
      <h2>Developers</h2>
      <p>Fusion4 Team</p>
      <ul>
        <li>Adityasinh Sodha</li>
        <li>Adityarajsinh Jadav</li>
        <li>Madhav Tank</li>
        <li>Prince Chovatiya</li>
      </ul>
    </div>
  </div>
</body>
</html>
