<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fusion</title>
  <style>
    :root {
      --ink: #1f2937;
      --paper: #f3f4f6;
      --panel: #ffffff;
      --border: #d1d5db;
      --brand: #2563eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Poppins", "Segoe UI", Arial, sans-serif;
      background: linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
      color: var(--ink);
      min-height: 100vh;
      padding: 24px;
    }

    .app {
      max-width: 1080px;
      margin: 0 auto;
      background: var(--paper);
      border: 3px solid var(--ink);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 16px 40px rgba(31, 41, 55, 0.12);
    }

    .nav {
      height: 58px;
      border-bottom: 3px solid var(--ink);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: var(--panel);
    }

    .brand {
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: 0.4px;
    }

    .settings {
      width: 32px;
      height: 32px;
      border: 3px solid var(--ink);
      border-radius: 10px;
      display: grid;
      place-items: center;
      font-size: 1rem;
      line-height: 1;
    }

    .content {
      padding: 30px 36px 36px;
    }

    .logo {
      margin: 8px 0 28px;
      text-align: center;
      font-size: clamp(2.75rem, 8vw, 4.6rem);
      font-weight: 800;
      letter-spacing: 4px;
      color: #111827;
    }

    .search-wrap {
      max-width: 480px;
      margin: 0 auto 34px;
    }

    .search-wrap h2 {
      margin: 0 0 10px;
      font-size: 1.5rem;
      text-align: center;
    }

    .search-row {
      display: flex;
      gap: 10px;
    }

    .search-row input {
      flex: 1;
      height: 46px;
      border: 3px solid var(--ink);
      border-radius: 12px;
      padding: 0 14px;
      font-size: 1rem;
      background: #fff;
      outline: none;
    }

    .search-row button {
      width: 46px;
      border: 3px solid var(--ink);
      border-radius: 12px;
      background: #fff;
      font-size: 1.25rem;
      cursor: pointer;
    }

    .categories {
      display: grid;
      grid-template-columns: repeat(5, minmax(120px, 1fr));
      gap: 14px;
      margin-bottom: 34px;
    }

    .category {
      border: 3px solid var(--ink);
      border-radius: 12px;
      font-weight: 600;
      text-align: center;
      min-height: 68px;
      display: grid;
      place-items: center;
      padding: 8px;
      font-size: 0.92rem;
      line-height: 1.2;
    }

    .cat-gaming { background: #e0e7ff; }
    .cat-electronics { background: #dcfce7; }
    .cat-home { background: #fef9c3; }
    .cat-gadgets { background: #ffe4e6; }
    .cat-stationary { background: #ede9fe; }

    .shops-title {
      font-size: 1.65rem;
      margin: 0 0 14px;
    }

    .shops {
      display: grid;
      grid-template-columns: repeat(5, minmax(120px, 1fr));
      gap: 16px;
    }

    .shop-card {
      background: #ffffff;
      border: 3px solid var(--ink);
      border-radius: 14px;
      min-height: 186px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      padding: 14px;
      font-size: 1.1rem;
      font-weight: 600;
    }

    @media (max-width: 980px) {
      .categories,
      .shops {
        grid-template-columns: repeat(3, minmax(140px, 1fr));
      }
    }

    @media (max-width: 700px) {
      body {
        padding: 14px;
      }

      .content {
        padding: 22px;
      }

      .categories,
      .shops {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
      }

      .shops-title {
        font-size: 1.4rem;
      }
    }

    @media (max-width: 430px) {
      .categories,
      .shops {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <nav class="nav">
      <div class="brand">fusionn.in</div>
      <div class="settings" aria-hidden="true">⚙</div>
    </nav>

    <section class="content">
      <h1 class="logo">FUSION</h1>

      <div class="search-wrap">
        <h2>Search products</h2>
        <div class="search-row">
          <input type="text" placeholder="Find nearby products..." aria-label="Search products">
          <button aria-label="Open filter menu">☰</button>
        </div>
      </div>

      <section class="categories" aria-label="Product categories">
        <div class="category cat-gaming">Gaming accessories</div>
        <div class="category cat-electronics">Electronic items</div>
        <div class="category cat-home">Home appliances</div>
        <div class="category cat-gadgets">Gadgets</div>
        <div class="category cat-stationary">Stationary items</div>
      </section>

      <h2 class="shops-title">Suggested shops</h2>

      <section class="shops" aria-label="Suggested shops">
        <article class="shop-card">Shop 1</article>
        <article class="shop-card">Shop 2</article>
        <article class="shop-card">Shop 3</article>
        <article class="shop-card">Shop 4</article>
        <article class="shop-card">Shop 5</article>
      </section>
    </section>
  </main>
</body>
</html>
