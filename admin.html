<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/admin-manifest.webmanifest">
<link rel="icon" href="/assets/icons/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/assets/icons/icon-180.svg">
<style>
body {
  margin: 0;
  font-family: Arial;
  background: #ffffff;
}

.container {
  max-width: 900px;
  margin: 40px auto;
}

.card {
  background: #fff;
  border: 1px solid #eee;
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 20px;
}

h2 {
  margin-top: 0;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: 1px solid #ddd;
  border-radius: 6px;
  font-size: 14px;
}

button {
  margin-top: 10px;
  padding: 10px 15px;
  border: none;
  border-radius: 6px;
  background: black;
  color: white;
  cursor: pointer;
}

button:hover {
  opacity: 0.85;
}

.data-item {
  border-bottom: 1px solid #eee;
  padding: 10px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.data-text {
  font-size: 13px;
  word-break: break-all;
}

.delete-btn {
  background: red;
}

#toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #111;
  color: #fff;
  padding: 12px 18px;
  border-radius: 8px;
  font-size: 14px;
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.3s ease;
  z-index: 999;
}

#toast.show {
  opacity: 1;
  transform: translateY(0);
}

#toast.success {
  background: #16a34a;
}

#toast.error {
  background: #dc2626;
}

#loader {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #ffffff;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.spinner {
  width: 45px;
  height: 45px;
  border: 4px solid #e5e7eb;
  border-top: 4px solid #2563eb;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

/* Mobile */
/* MOBILE APP UI */
@media (max-width: 600px) {

  body {
    margin: 0;
    padding: 0;
    background: #fff;
  }

  .container {
    margin: 0;
    max-width: 100%;
  }

  .card {
    border: none;
    border-radius: 0;
    padding: 15px;
    margin: 0;
    border-bottom: 1px solid #eee;
  }

  h2, h3 {
    font-size: 18px;
    margin-bottom: 10px;
  }

  input, select {
    font-size: 16px;
    padding: 12px;
  }

  button {
    font-size: 14px;
    padding: 10px 12px;
  }

  /* TABLE → MOBILE CARDS */
  table {
    display: block;
    border: none;
  }

  thead {
    display: none;
  }

  tbody {
    display: block;
  }

  tr {
    display: block;
    border: 1px solid #eee;
    border-radius: 10px;
    margin-bottom: 12px;
    padding: 10px;
  }

  td {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border: none !important;
    font-size: 14px;
  }

  td::before {
    content: attr(data-label);
    font-weight: bold;
    color: #555;
  }

  td:last-child {
    justify-content: flex-end;
    gap: 8px;
  }

  td button {
    margin: 0;
  }

  img {
    width: 60px !important;
    height: auto;
  }

  /*  Floating Add Button */
  #addBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    border-radius: 50%;
    width: 55px;
    height: 55px;
    font-size: 22px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Toast full width */
  #toast {
    left: 10px;
    right: 10px;
    bottom: 15px;
    text-align: center;
  }

  .add-btn {
  background: #2563eb !important;
}

.add-btn:hover {
  background: #1d4ed8 !important;
}

}

</style>

</head>
<body>

<div class="container">

  <div class="card" id="loginBox">
    <h2>Admin Login</h2>
    <input id="pass" placeholder="Enter password">
    <button onclick="login()">Login</button>
  </div>

  <div id="panel" style="display:none;">

    <div class="card">
      <h2>Dashboard</h2>
      <select id="collection"></select>
      <button onclick="loadData()">Load Data</button>
    </div>

    <div class="card">
      <h3>Data</h3>
      <div id="data"></div>
    </div>

    <div class="card">
      <button id="addBtn" class="add-btn" onclick="addRow()" style="display:none;">+</button>
    </div>

  </div>

</div>
<script>
const API = "https://fusion-back.onrender.com"

async function login() {
  const res = await fetch(API + '/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ password: pass.value })
  })
  const data = await res.json()

  if (data.success) {
    loginBox.style.display = 'none'
    panel.style.display = 'block'
    await loadCollections()
    collection.value = "shops"
    loadData()
  } else {
    alert('Wrong password')
  }
}

async function loadCollections() {
  try {
    const res = await fetch(API + '/collections')
    const cols = await res.json()

    collection.innerHTML = ''
    cols.forEach(c => {
      let opt = document.createElement('option')
      opt.value = c
      opt.innerText = c
      collection.appendChild(opt)
    })
  } catch {
    collection.innerHTML = `
      <option value="products">products</option>
      <option value="shops">shops</option>
    `
  }
}

async function loadData() {
  showLoader()

  try {
    const res = await fetch(API + '/data/' + collection.value)
    const data = await res.json()

    const dataDiv = document.getElementById('data')
    const addBtn = document.getElementById('addBtn')

    dataDiv.innerHTML = ''
    addBtn.style.display = 'none'

    if (data.length === 0) {
      dataDiv.innerHTML = "No data found"
      hideLoader()
      return
    }

    addBtn.style.display = 'inline-block'

    const table = document.createElement('table')
    table.style.width = '100%'
    table.style.border = '1px solid #ddd'

    const keys = Object.keys(data[0]).filter(k => k !== '_id')

    const thead = document.createElement('thead')
    const headerRow = document.createElement('tr')

    keys.forEach(key => {
      const th = document.createElement('th')
      th.innerText = key
      th.style.padding = '10px'
      th.style.border = '1px solid #ddd'
      th.style.background = '#f9f9f9'
      headerRow.appendChild(th)
    })

    const actionTh = document.createElement('th')
    actionTh.innerText = 'Action'
    headerRow.appendChild(actionTh)

    thead.appendChild(headerRow)
    table.appendChild(thead)

    const tbody = document.createElement('tbody')

    data.forEach(item => {
      const tr = document.createElement('tr')

      keys.forEach(key => {
        const td = document.createElement('td')
        let value = item[key]

        if (key === 'image') {
          value = `<img src="${value}" width="50">`
        }

        td.innerHTML = value || ''
        td.setAttribute('data-label', key)
        td.style.padding = '10px'
        td.style.border = '1px solid #eee'
        tr.appendChild(td)
      })

      const actionTd = document.createElement('td')
      actionTd.style.whiteSpace = 'nowrap'

      actionTd.innerHTML = `
        <button onclick="editRow(this, '${item._id}')">Edit</button>
        <button onclick="del('${item._id}')">Delete</button>
      `

      tr.appendChild(actionTd)
      tbody.appendChild(tr)
    })

    table.appendChild(tbody)

    const wrapper = document.createElement('div')
    wrapper.style.overflowX = 'auto'
    wrapper.appendChild(table)

    dataDiv.appendChild(wrapper)

    hideLoader()

  } catch (err) {
    hideLoader()
    showToast("Failed to load data", "error")
    console.error(err)
  }
}

function addRow() {
  const table = document.querySelector('#data table')
  if (!table) return

  const tbody = table.querySelector('tbody')
  const keys = Array.from(table.querySelectorAll('thead th'))
    .map(th => th.innerText)
    .filter(k => k !== 'Action')

  const tr = document.createElement('tr')

  keys.forEach(key => {
    const td = document.createElement('td')

    const input = document.createElement('input')
    input.style.fontSize = '16px'
    input.placeholder = key
    input.style.width = '100%'

    td.appendChild(input)
    tr.appendChild(td)
  })

  const actionTd = document.createElement('td')

  actionTd.style.whiteSpace = 'nowrap'

actionTd.innerHTML = `
  <button onclick="saveRow(this)">Save</button>
  <button onclick="this.parentElement.parentElement.remove()">Cancel</button>
`

  tr.appendChild(actionTd)
  tbody.appendChild(tr)
}

async function saveRow(btn) {
  const tr = btn.parentElement.parentElement
  const inputs = tr.querySelectorAll('input')
  const obj = {}

  inputs.forEach(input => {
    obj[input.placeholder] = input.value
  })

  try {
    const res = await fetch(API + '/add/' + collection.value, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(obj)
    })

    if (res.ok) {
      showToast("Added successfully", "success")
      loadData()
    } else {
      showToast("Add failed", "error")
    }
  } catch {
    showToast("Server error", "error")
  }
}

function editRow(btn, id) {
  const tr = btn.parentElement.parentElement
  const tds = tr.querySelectorAll('td')

  for (let i = 0; i < tds.length - 1; i++) {
    const text = tds[i].innerText
    tds[i].innerHTML = `<input value="${text}" style="width:100%">`
  }

  tds[tds.length - 1].innerHTML = `
    <button onclick="updateRow(this, '${id}')">Save</button>
    <button onclick="loadData()">Cancel</button>
  `
}

async function updateRow(btn, id) {
  const tr = btn.parentElement.parentElement
  const inputs = tr.querySelectorAll('input')
  const headers = document.querySelectorAll('thead th')

  const obj = {}

  inputs.forEach((input, i) => {
    const key = headers[i].innerText
    obj[key] = input.value
  })

  try {
    const res = await fetch(API + '/update/' + collection.value + '/' + id, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(obj)
    })

    if (res.ok) {
      showToast("Updated successfully", "success")
      loadData()
    } else {
      showToast("Update failed", "error")
    }
  } catch {
    showToast("Server error", "error")
  }
}

async function del(id) {
  const confirmDelete = confirm("Are you sure you want to delete this item?")
  if (!confirmDelete) return

  try {
    const res = await fetch(API + '/delete/' + collection.value + '/' + id, {
      method: 'DELETE'
    })

    if (res.ok) {
      showToast("Deleted successfully", "success")
      loadData()
    } else {
      showToast("Delete failed", "error")
    }
  } catch {
    showToast("Server error", "error")
  }
}

function showToast(message, type = 'success') {
  const toast = document.getElementById('toast')

  toast.innerText = message
  toast.className = 'show ' + type

  setTimeout(() => {
    toast.className = toast.className.replace('show', '')
  }, 2500)
}

function showLoader() {
  document.getElementById('loader').style.display = 'flex'
}

function hideLoader() {
  document.getElementById('loader').style.display = 'none'
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/admin-service-worker.js', { scope: '/admin.html' }).catch((error) => {
      console.error('Admin service worker registration failed:', error)
    })
  })
}

</script>
<div id="toast"></div>
<div id="loader">
  <div class="spinner"></div>
</div>
</body>
</html>
